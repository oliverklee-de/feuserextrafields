---
name: CI
on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '15 3 * * 1'
permissions:
  contents: read
jobs:
  php-lint:
    name: PHP linter
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Show the Composer version
        run: ./Build/Scripts/runTests.sh -s composer -- --version
      - name: Show the Composer configuration
        run: ./Build/Scripts/runTests.sh -s composer config --global --list
      - name: Cache dependencies installed with composer
        uses: actions/cache@v5
        with:
          key: "php-${{ matrix.php-version }}-typo3-${{ matrix.typo3-version }}-${{ matrix.composer-dependencies }}-composer-${{ hashFiles('**/composer.json') }}"
          path: ~/.cache/composer
          restore-keys: "php-${{ matrix.php-version }}-typo3-${{ matrix.typo3-version }}-${{ matrix.composer-dependencies }}-composer-\n"
      - name: Install composer dependencies
        run: |
          ./Build/Scripts/runTests.sh -p ${{ matrix.php-version }} -t ${{matrix.typo3-version}} -s composerUpdate${{matrix.composer-dependencies}}
      - name: Lint PHP
        run: |
          Build/Scripts/runTests.sh -p ${{ matrix.php-version }} -s lintPhp
    strategy:
      fail-fast: false
      matrix:
        include:
          - typo3-version: "12.4"
            php-version: "8.1"
            composer-dependencies: Max
          - typo3-version: "12.4"
            php-version: "8.2"
            composer-dependencies: Max
          - typo3-version: "12.4"
            php-version: "8.3"
            composer-dependencies: Max
          - typo3-version: "12.4"
            php-version: "8.4"
            composer-dependencies: Max
  prepare-release:
    name: Check prepare release script
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run prepare release
        run: Build/Scripts/runTests.sh -p ${{ matrix.php-version }} -s composer prepare-release
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "8.2"
  code-quality:
    name: Code quality checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Show the Composer version
        run: ./Build/Scripts/runTests.sh -s composer -- --version
      - name: Show the Composer configuration
        run: ./Build/Scripts/runTests.sh -s composer config --global --list
      - name: Cache dependencies installed with composer
        uses: actions/cache@v5
        with:
          key: "php-${{ matrix.php-version }}-typo3-${{ matrix.typo3-version }}-${{ matrix.composer-dependencies }}-composer-${{ hashFiles('**/composer.json') }}"
          path: ~/.cache/composer
          restore-keys: "php-${{ matrix.php-version }}-typo3-${{ matrix.typo3-version }}-${{ matrix.composer-dependencies }}-composer-\n"
      - name: Install composer dependencies
        run: |
          ./Build/Scripts/runTests.sh -p ${{ matrix.php-version }} -t ${{matrix.typo3-version}} -s composerUpdate${{matrix.composer-dependencies}}
      - name: Run code quality checks
        run: |
          Build/Scripts/runTests.sh -p ${{ matrix.php-version }} -s composer check:${{ matrix.command }}
    strategy:
      fail-fast: false
      matrix:
        command:
          - "composer:normalize"
          - "php:cs-fixer"
          - "php:rector"
          - "php:sniff"
          - "php:stan"
          - "xliff:lint"
          - "yaml:lint"
        # For consistency, the PHP version should match the default PHP version in `runTests.sh`.
        php-version:
          - "8.2"
        # For consistency, the TYPO3 version should match the default TYPO3 version in `runTests.sh`.
        typo3-version:
          - "12.4"
        composer-dependencies:
          - Max
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-24.04
    needs: php-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Show the Composer version
        run: ./Build/Scripts/runTests.sh -s composer -- --version
      - name: Show the Composer configuration
        run: ./Build/Scripts/runTests.sh -s composer config --global --list
      - name: Cache dependencies installed with composer
        uses: actions/cache@v5
        with:
          key: "php-${{ matrix.php-version }}-typo3-${{ matrix.typo3-version }}-${{ matrix.composer-dependencies }}-composer-${{ hashFiles('**/composer.json') }}"
          path: ~/.cache/composer
          restore-keys: "php-${{ matrix.php-version }}-typo3-${{ matrix.typo3-version }}-${{ matrix.composer-dependencies }}-composer-\n"
      - name: Install composer dependencies
        run: |
          ./Build/Scripts/runTests.sh -p ${{ matrix.php-version }} -t ${{matrix.typo3-version}} -s composerUpdate${{matrix.composer-dependencies}}
      - name: Run unit tests
        run: |
          ./Build/Scripts/runTests.sh -p ${{ matrix.php-version }} -s unit
    strategy:
      fail-fast: false
      matrix:
        include:
          - typo3-version: "12.4"
            php-version: "8.1"
            composer-dependencies: Min
          - typo3-version: "12.4"
            php-version: "8.1"
            composer-dependencies: Max
          - typo3-version: "12.4"
            php-version: "8.4"
            composer-dependencies: Min
          - typo3-version: "12.4"
            php-version: "8.4"
            composer-dependencies: Max
  functional-tests:
    name: Functional tests
    runs-on: ubuntu-24.04
    needs: php-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Show the Composer version
        run: ./Build/Scripts/runTests.sh -s composer -- --version
      - name: Show the Composer configuration
        run: ./Build/Scripts/runTests.sh -s composer config --global --list
      - name: Cache dependencies installed with composer
        uses: actions/cache@v5
        with:
          key: "php-${{ matrix.php-version }}-typo3-${{ matrix.typo3-version }}-${{ matrix.composer-dependencies }}-composer-${{ hashFiles('**/composer.json') }}"
          path: ~/.cache/composer
          restore-keys: "php-${{ matrix.php-version }}-typo3-${{ matrix.typo3-version }}-${{ matrix.composer-dependencies }}-composer-\n"
      - name: Install composer dependencies
        run: |
          ./Build/Scripts/runTests.sh -p ${{ matrix.php-version }} -t ${{matrix.typo3-version}} -s composerUpdate${{matrix.composer-dependencies}}
      - name: Run functional tests
        run: |
          ./Build/Scripts/runTests.sh -p ${{ matrix.php-version }} -d ${{ matrix.dbms }} -s functional
    strategy:
      fail-fast: false
      matrix:
        include:
          - typo3-version: "12.4"
            php-version: "8.1"
            dbms: "mysql"
            composer-dependencies: Min
          - typo3-version: "12.4"
            php-version: "8.1"
            dbms: "mysql"
            composer-dependencies: Max
          - typo3-version: "12.4"
            php-version: "8.3"
            dbms: "mysql"
            composer-dependencies: Min
          - typo3-version: "12.4"
            php-version: "8.3"
            dbms: "mysql"
            composer-dependencies: Max
          #          - typo3-version: "12.4"
          #            php-version: "8.4"
          #            dbms: "mysql"
          #            composer-dependencies: Min
          - typo3-version: "12.4"
            php-version: "8.4"
            composer-dependencies: Max
            dbms: "mysql"
  documentation:
    name: Documentation
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Test if the documentation will render without warnings
        run: |
          Build/Scripts/runTests.sh -s docsGenerate
